{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Order</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', 'Poppins', sans-serif;
            background: linear-gradient(180deg, #e4d3c1 0%, #d89b6e 100%);
            color: #aa5825;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(170, 88, 37, 0.3) 0%, transparent 60%);
            z-index: -1;
            animation: cosmic-pulse 12s infinite ease-in-out;
        }
        @keyframes cosmic-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }
        body::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(228, 211, 193, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(228, 211, 193, 0.6);
            animation: orbit 18s infinite ease-in-out;
            top: 15%;
            left: 25%;
        }
        @keyframes orbit {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(50vw, 60vh) scale(1.4); opacity: 0.8; }
        }
        .order-container {
            max-width: 1100px;
            margin: 80px auto;
            padding: 40px;
            background: rgba(228, 211, 193, 0.9);
            border-radius: 30px;
            box-shadow: 0 12px 50px rgba(170, 88, 37, 0.3), 0 0 70px rgba(216, 155, 110, 0.2);
            position: relative;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border: 3px solid rgba(170, 88, 37, 0.5);
        }
        .order-container:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 60px rgba(170, 88, 37, 0.4), 0 0 90px rgba(216, 155, 110, 0.3);
        }
        h1 {
            font-size: 3.5em;
            color: #aa5825;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(170, 88, 37, 0.6), 0 0 30px rgba(228, 211, 193, 0.4);
            animation: glow 2.5s infinite ease-in-out;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(170, 88, 37, 0.6), 0 0 30px rgba(228, 211, 193, 0.4); }
            50% { text-shadow: 0 0 30px rgba(170, 88, 37, 0.8), 0 0 40px rgba(228, 211, 193, 0.6); }
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .item-card {
            background: rgba(228, 211, 193, 0.8);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(170, 88, 37, 0.2);
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(216, 155, 110, 0.4);
            background: rgba(216, 155, 110, 0.3);
        }
        .item-card img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .item-card h3 {
            font-size: 1.2em;
            color: #aa5825;
            margin-bottom: 5px;
        }
        .item-card p {
            font-size: 1em;
            color: #aa5825;
            margin-bottom: 10px;
        }
        .item-card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #aa5825;
            cursor: pointer;
        }
        .submit-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 25px;
            background: linear-gradient(45deg, #e4d3c1, #d89b6e);
            color: #aa5825;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(170, 88, 37, 0.2);
            transition: transform 0.4s ease, background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
        }
        .submit-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: linear-gradient(45deg, #d89b6e, #aa5825);
            color: #e4d3c1;
            box-shadow: 0 10px 25px rgba(216, 155, 110, 0.4);
        }
        .message {
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(170, 88, 37, 0.2);
        }
        .success { color: #aa5825; background: rgba(170, 88, 37, 0.2); }
        .error { color: #d89b6e; background: rgba(216, 155, 110, 0.2); }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            font-size: 1.3em;
            color: #aa5825;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
        }
        .back-link:hover {
            color: #d89b6e;
            transform: scale(1.1);
            text-shadow: 0 0 10px rgba(216, 155, 110, 0.5);
        }
    </style>
</head>
<body>
    <div class="order-container">
        <h1>Place Your Order</h1>
        {% if message %}
            <p class="message success">{{ message }}</p>
        {% endif %}
        {% if error %}
            <p class="message error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="items-grid">
                {% for item in items %}
                    <div class="item-card">
                        {% if item.image %}
                            <img src="{{ item.image.url }}" alt="{{ item.name }}">
                        {% else %}
                            <img src="{% static 'images/placeholder.png' %}" alt="No Image">
                        {% endif %}
                        <h3>{{ item.name }}</h3>
                        <p>${{ item.price }}</p>
                        <input type="checkbox" name="item_{{ item.id }}" value="1">
                    </div>
                {% endfor %}
            </div>
            <button type="submit" class="submit-btn">Place Order</button>
        </form>
        <a href="{% url 'cafe:home' %}" class="back-link">Back to Home</a>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
