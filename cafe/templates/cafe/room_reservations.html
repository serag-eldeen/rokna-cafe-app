{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Reservations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', 'Poppins', sans-serif;
            background: linear-gradient(180deg, #e4d3c1 0%, #d89b6e 100%);
            color: #aa5825;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(170, 88, 37, 0.3) 0%, transparent 60%);
            z-index: -1;
            animation: cosmic-pulse 12s infinite ease-in-out;
        }
        @keyframes cosmic-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }
        body::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(228, 211, 193, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(228, 211, 193, 0.6);
            animation: orbit 18s infinite ease-in-out;
            top: 15%;
            left: 25%;
        }
        @keyframes orbit {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(50vw, 60vh) scale(1.4); opacity: 0.8; }
        }
        .admin-container {
            max-width: 1100px;
            margin: 80px auto;
            padding: 40px;
            background: rgba(228, 211, 193, 0.9);
            border-radius: 30px;
            box-shadow: 0 12px 50px rgba(170, 88, 37, 0.3), 0 0 70px rgba(216, 155, 110, 0.2);
            position: relative;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border: 3px solid rgba(170, 88, 37, 0.5);
        }
        .admin-container:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 60px rgba(170, 88, 37, 0.4), 0 0 90px rgba(216, 155, 110, 0.3);
        }
        h1 {
            font-size: 3.5em;
            color: #aa5825;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(170, 88, 37, 0.6), 0 0 30px rgba(228, 211, 193, 0.4);
            animation: glow 2.5s infinite ease-in-out;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(170, 88, 37, 0.6), 0 0 30px rgba(228, 211, 193, 0.4); }
            50% { text-shadow: 0 0 30px rgba(170, 88, 37, 0.8), 0 0 40px rgba(228, 211, 193, 0.6); }
        }
        .section {
            margin-bottom: 50px;
            padding: 25px;
            background: rgba(216, 155, 110, 0.1);
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(170, 88, 37, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(216, 155, 110, 0.25);
        }
        h2 {
            font-size: 2em;
            color: #aa5825;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(170, 88, 37, 0.3);
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 15px 20px;
            margin: 10px 0;
            background: rgba(228, 211, 193, 0.8);
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(170, 88, 37, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }
        li:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(216, 155, 110, 0.3);
            background: rgba(216, 155, 110, 0.3);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            font-size: 1.3em;
            color: #aa5825;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
        }
        .back-link:hover {
            color: #d89b6e;
            transform: scale(1.1);
            text-shadow: 0 0 10px rgba(216, 155, 110, 0.5);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Room Reservations</h1>
        <div class="section">
            <h2>Room Reservations</h2>
            <ul>
                {% for reservation in room_reservations %}
                    <li>{{ reservation.user.username }} - Room {{ reservation.room.number }} - {{ reservation.date }} {{ reservation.start_time }}</li>
                {% endfor %}
            </ul>
        </div>
        <a href="{% url 'cafe:admin_dashboard' %}" class="back-link">Back to Dashboard</a>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
